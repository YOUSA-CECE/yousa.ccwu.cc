{% extends "base.html" %}
{% block title %}写日志 — yousa.ccwu.cc{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card" style="max-width:600px">
        <h1 class="auth-title">✏️ 写日志</h1>
        <form method="post">
            <div class="form-group">
                <input type="text" name="title" required autofocus
                       placeholder="标题" class="form-input" style="font-size:1.1rem">
            </div>
            <div class="form-group">
                <textarea name="content" required
                       placeholder="支持 Markdown 格式…" class="form-input"
                       style="min-height:300px;resize:vertical;line-height:1.7"
                ></textarea>
            </div>
            <button type="submit" class="form-btn">发布</button>
        </form>
        <a href="/blog" class="auth-back">← 返回日志列表</a>
    </div>
</div>
{% endblock %}
