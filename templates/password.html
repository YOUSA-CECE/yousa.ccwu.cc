{% extends "base.html" %}
{% block title %}修改密码 — yousa.dev{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">🔑 修改密码</h1>
        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="old_password">当前密码</label>
                <input type="password" id="old_password" name="old_password" required autofocus
                       placeholder="输入当前密码" class="form-input">
            </div>
            <div class="form-group">
                <label for="new_password">新密码</label>
                <input type="password" id="new_password" name="new_password" required
                       placeholder="至少 4 位" class="form-input">
            </div>
            <div class="form-group">
                <label for="confirm_password">确认新密码</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       placeholder="再次输入新密码" class="form-input">
            </div>
            <button type="submit" class="form-btn">修改密码</button>
        </form>
        <a href="/admin" class="auth-back">← 返回管理后台</a>
    </div>
</div>
{% endblock %}
