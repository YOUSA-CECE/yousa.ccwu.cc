apply plugin: 'com.android.application'

android {
    namespace 'com.yousa.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.yousa.app'
        minSdk 24
        targetSdk 35
        versionCode 5
        versionName '1.0.4'
    }
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

// NO external dependencies — using only Android SDK built-in classes
dependencies {
}
